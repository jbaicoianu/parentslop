<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Color by Numbers — Canvas</title>
  <link rel="stylesheet" href="library.css">
  <style>
    html, body { height: 100%; margin: 0; background: #181a1b; color: #e8e6e3; }
    body { overflow: hidden; }
    body.library-open { overflow: auto; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    library-screen { display: none; }
    /* Optional: drag-and-drop hint (in-canvas UI handles the rest) */
  </style>
</head>
<body>
<library-screen id="library"></library-screen>
<canvas id="app"></canvas>
<script src="tap-color.js"></script>
<script>

/****************
 * Sample SVG   *
 ****************/

</body>
</html>
