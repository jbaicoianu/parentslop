AWSTemplateFormatVersion: '2010-09-09'
Description: ParentSlop - ECS Fargate Spot + EFS + CloudFront

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (use your default VPC)
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 public subnets in different AZs
  HostedZoneIdParentslop:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone for parentslop.com
  HostedZoneIdPplap:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone for pplap.com
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1, covering *.parentslop.com and *.pplap.com)
  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy

Resources:

  # ECR repo managed outside this stack (created by deploy.sh)

  # --- Security Groups ---
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ParentSlop ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ParentSlop EFS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSSecurityGroup

  # --- EFS ---
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_14_DAYS

  EFSMountTarget0:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups: [!Ref EFSSecurityGroup]

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups: [!Ref EFSSecurityGroup]

  EFSAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: '1000'
        Gid: '1000'
      RootDirectory:
        Path: /parentslop
        CreationInfo:
          OwnerUid: '1000'
          OwnerGid: '1000'
          Permissions: '755'

  # --- IAM ---
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ssm-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/parentslop/*'

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: efs-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !GetAtt EFSFileSystem.Arn
        - PolicyName: s3-backups
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub 'arn:aws:s3:::parentslop-backups-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::parentslop-backups-${AWS::AccountId}/*'
        - PolicyName: ssm-exec
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: '*'

  # --- Logs ---
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/parentslop
      RetentionInDays: 14

  # --- ECS Cluster ---
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: parentslop
      CapacityProviders:
        - FARGATE_SPOT
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 1

  # --- ECS Task Definition ---
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: parentslop
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Volumes:
        - Name: efs-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref EFSFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref EFSAccessPoint
              IAM: ENABLED
      ContainerDefinitions:
        - Name: parentslop
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/parentslop:${ImageTag}'
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          MountPoints:
            - SourceVolume: efs-data
              ContainerPath: /data
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: BACKUP_BUCKET
              Value: !Sub 'parentslop-backups-${AWS::AccountId}'
            - Name: NODE_ENV
              Value: production
            - Name: DATA_DIR
              Value: /data
          Secrets:
            - Name: SYNC_SECRET
              ValueFrom: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/parentslop/sync-secret'
          Essential: true

  # --- ECS Service ---
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: [EFSMountTarget0, EFSMountTarget1]
    Properties:
      Cluster: !Ref ECSCluster
      ServiceName: parentslop
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups: [!Ref ECSSecurityGroup]
      EnableExecuteCommand: true
      AvailabilityZoneRebalancing: DISABLED
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true

  # --- Origin DNS Updater (Lambda + EventBridge) ---
  OriginUpdaterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: origin-updater
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeTasks
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeNetworkInterfaces
                Resource: '*'
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                Resource: !Sub 'arn:aws:route53:::hostedzone/${HostedZoneIdParentslop}'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  OriginUpdater:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: parentslop-origin-updater
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt OriginUpdaterRole.Arn
      Timeout: 30
      Environment:
        Variables:
          HOSTED_ZONE_ID: !Ref HostedZoneIdParentslop
          RECORD_NAME: origin.parentslop.com
      Code:
        ZipFile: |
          import boto3, json, os
          ecs = boto3.client('ecs')
          ec2 = boto3.client('ec2')
          r53 = boto3.client('route53')
          def handler(event, context):
              print(json.dumps(event))
              d = event['detail']
              task = ecs.describe_tasks(cluster=d['clusterArn'], tasks=[d['taskArn']])['tasks'][0]
              eni_id = None
              for a in task.get('attachments', []):
                  if a['type'] == 'ElasticNetworkInterface':
                      for kv in a['details']:
                          if kv['name'] == 'networkInterfaceId':
                              eni_id = kv['value']
              if not eni_id:
                  print('No ENI found'); return
              eni = ec2.describe_network_interfaces(NetworkInterfaceIds=[eni_id])['NetworkInterfaces'][0]
              ip = eni.get('Association', {}).get('PublicIp')
              if not ip:
                  print('No public IP'); return
              print(f'Updating {os.environ["RECORD_NAME"]} -> {ip}')
              r53.change_resource_record_sets(
                  HostedZoneId=os.environ['HOSTED_ZONE_ID'],
                  ChangeBatch={'Changes': [{'Action': 'UPSERT', 'ResourceRecordSet': {
                      'Name': os.environ['RECORD_NAME'], 'Type': 'A', 'TTL': 15,
                      'ResourceRecords': [{'Value': ip}]}}]})
              print('Done')

  OriginUpdaterRule:
    Type: AWS::Events::Rule
    Properties:
      Name: parentslop-origin-updater
      EventPattern:
        source:
          - aws.ecs
        detail-type:
          - ECS Task State Change
        detail:
          clusterArn:
            - !GetAtt ECSCluster.Arn
          lastStatus:
            - RUNNING
      Targets:
        - Id: origin-updater
          Arn: !GetAtt OriginUpdater.Arn

  OriginUpdaterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OriginUpdater
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OriginUpdaterRule.Arn

  # --- CloudFront ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        Aliases:
          - parentslop.com
          - '*.parentslop.com'
          - pplap.com
          - '*.pplap.com'
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: app
            DomainName: origin.parentslop.com
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 8080
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: app
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

  # --- Route 53 ---
  DNSParentslop:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneIdParentslop
      Name: parentslop.com
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DNSParentslopWild:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneIdParentslop
      Name: '*.parentslop.com'
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DNSPplap:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneIdPplap
      Name: pplap.com
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DNSPplapWild:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneIdPplap
      Name: '*.pplap.com'
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
  OriginDns:
    Value: origin.parentslop.com
  EFSFileSystemId:
    Value: !Ref EFSFileSystem
  BackupBucket:
    Value: !Sub 'parentslop-backups-${AWS::AccountId}'
